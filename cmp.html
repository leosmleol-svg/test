<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Панель управления — RedictStyle</title>
    <style>
        :root[data-theme="dark"] { --bg: #0a0a0a; --card: #141414; --acc: #00ff88; --txt: #eee; --brd: #222; --item: #1c1c1c; --muted: #777; --btn-hover: #1f1f1f; }
        :root[data-theme="light"] { --bg: #f8f9fa; --card: #fff; --acc: #007bff; --txt: #222; --brd: #eaeaea; --item: #f1f3f5; --muted: #999; --btn-hover: #e9ecef; }
        
        body { background: var(--bg); color: var(--txt); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 0; padding: 15px; display: flex; justify-content: center; align-items: center; min-height: 100vh; box-sizing: border-box; }
        .card { background: var(--card); border: 1px solid var(--brd); padding: 25px; border-radius: 24px; width: 100%; max-width: 400px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        
        .header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        h2 { margin: 0; font-size: 1.4rem; font-weight: 800; letter-spacing: -0.5px; }
        
        .nav-menu { display: flex; flex-direction: column; gap: 12px; }
        
        .menu-item { 
            display: flex; 
            align-items: center; 
            justify-content: space-between;
            background: var(--item); 
            border: 1px solid var(--brd); 
            padding: 20px; 
            border-radius: 18px; 
            color: var(--txt); 
            text-decoration: none; 
            transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            -webkit-tap-highlight-color: transparent;
        }

        .menu-item:active { transform: scale(0.97); background: var(--btn-hover); }
        
        .menu-info { display: flex; flex-direction: column; }
        .menu-title { font-weight: 700; font-size: 16px; color: var(--acc); margin-bottom: 4px; }
        .menu-desc { font-size: 12px; color: var(--muted); }
        
        .arrow { font-size: 18px; color: var(--muted); opacity: 0.5; }

        .footer-link { margin-top: 25px; display: block; text-align: center; color: var(--muted); text-decoration: none; font-size: 13px; transition: 0.2s; }
        .footer-link:hover { color: var(--acc); }
    </style>
</head>
<body>

<div class="card">
    <div class="header-top">
        <h2>Сервисы LBS</h2>
        <button onclick="toggleTheme()" style="background:none; border:none; cursor:pointer; font-size:1.2rem;">🌓</button>
    </div>

    <div class="nav-menu">
        <a href="https://leo-lbs.ru/cmp/" class="menu-item">
            <div class="menu-info">
                <span class="menu-title">КОМПИЛЯТОР</span>
                <span class="menu-desc">Сборка и проверка кода</span>
            </div>
            <span class="arrow">→</span>
        </a>

        <a href="https://leo-lbs.ru/test/" class="menu-item">
            <div class="menu-info">
                <span class="menu-title">ЛОТОРЕЯ</span>
                <span class="menu-desc">Проверка билетов и розыгрыши</span>
            </div>
            <span class="arrow">→</span>
        </a>
    </div>

    <a href="https://leo-lbs.ru" class="footer-link">Вернуться на главную</a>
</div>

<script>
    // Сохранение темы
    if(localStorage.getItem('theme') === 'light') document.documentElement.setAttribute('data-theme', 'light');
    
    function toggleTheme() {
        const d = document.documentElement;
        const t = d.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
        d.setAttribute('data-theme', t);
        localStorage.setItem('theme', t);
    }
</script>

</body>
</html>
