<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PYPAINT — Distribution</title>
    <style>
        :root[data-theme="dark"] { 
            --bg: #0a0a0a; --card: #141414; --acc: #58a6ff; --acc-soft: rgba(88,166,255,0.1); 
            --txt: #eee; --brd: #222; --item: #1c1c1c; --muted: #777; --btn-hover: #1f1f1f; 
            --green: #3fb950; --yellow: #d29922;
        }
        :root[data-theme="light"] { 
            --bg: #f8f9fa; --card: #fff; --acc: #007bff; --acc-soft: rgba(0,123,255,0.1); 
            --txt: #222; --brd: #eaeaea; --item: #f1f3f5; --muted: #999; --btn-hover: #e9ecef; 
            --green: #28a745; --yellow: #9b6d00;
        }
        
        body { 
            background: var(--bg); color: var(--txt); 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            margin: 0; padding: 15px; display: flex; justify-content: center; 
            align-items: center; min-height: 100vh; box-sizing: border-box; 
        }

        .card { 
            background: var(--card); border: 1px solid var(--brd); 
            padding: 25px; border-radius: 28px; width: 100%; 
            max-width: 420px; box-shadow: 0 20px 40px rgba(0,0,0,0.2); 
            position: relative; overflow: hidden;
        }
        
        .header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .brand { display: flex; flex-direction: column; }
        h2 { margin: 0; font-size: 1.5rem; font-weight: 800; letter-spacing: -1px; color: var(--acc); }
        .version { font-size: 10px; font-weight: bold; color: var(--muted); letter-spacing: 1px; }
        
        .nav-menu { display: flex; flex-direction: column; gap: 12px; }
        
        .menu-item { 
            display: flex; align-items: center; justify-content: space-between;
            background: var(--item); border: 1px solid var(--brd); 
            padding: 18px 22px; border-radius: 20px; color: var(--txt); 
            text-decoration: none; cursor: pointer; transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            -webkit-tap-highlight-color: transparent;
        }

        .menu-item:active { transform: scale(0.96); background: var(--btn-hover); }
        
        .menu-info { display: flex; flex-direction: column; }
        .menu-title { font-weight: 700; font-size: 15px; margin-bottom: 2px; }
        .menu-desc { font-size: 12px; color: var(--muted); }
        
        .badge { font-size: 9px; padding: 2px 8px; border-radius: 6px; background: var(--acc-soft); color: var(--acc); font-weight: 800; }
        .badge.green { color: var(--green); background: rgba(63,185,80,0.1); }

        /* MODAL / LOADER */
        .modal-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--card); z-index: 10; display: none;
            flex-direction: column; justify-content: center; align-items: center; padding: 30px; box-sizing: border-box;
            text-align: center;
        }

        .progress-container { width: 100%; background: var(--item); height: 8px; border-radius: 10px; margin-top: 20px; overflow: hidden; }
        #progress-fill { width: 0%; height: 100%; background: var(--acc); transition: width 0.4s ease; }
        .modal-status { font-size: 14px; font-weight: 600; margin-top: 15px; color: var(--txt); }

        .footer-link { margin-top: 25px; display: block; text-align: center; color: var(--muted); text-decoration: none; font-size: 13px; transition: 0.2s; }
        .footer-link:hover { color: var(--acc); }

        .theme-btn { background: var(--item); border: 1px solid var(--brd); padding: 8px; border-radius: 12px; cursor: pointer; }
    </style>
</head>
<body>

<div class="card">
    <div id="gen-modal" class="modal-overlay">
        <div id="gen-icon" style="font-size: 2.5rem; margin-bottom: 10px;">☁️</div>
        <div id="gen-title" class="modal-status">Подготовка файлов...</div>
        <div class="progress-container">
            <div id="progress-fill"></div>
        </div>
        <div style="font-size: 10px; color: var(--muted); margin-top: 20px; font-family: monospace; letter-spacing: 1px;">STATUS: REDIRECTING_TO_FILE</div>
    </div>

    <div class="header-top">
        <div class="brand">
            <h2>PYPAINT</h2>
            <span class="version">STABLE BUILD v1.1</span>
        </div>
        <button class="theme-btn" onclick="toggleTheme()">🌓</button>
    </div>
        <div onclick="startDownload('zip')" class="menu-item">
            <div class="menu-info">
                <span class="menu-title">rp.html <span class="badge">ZIP</span></span>
                <span class="menu-desc">Архив для ручной распаковки</span>
            </div>
            <span>📦</span>
        </div>

        <a href="https://github.com/leosmleol-svg/pypaint" target="_blank" class="menu-item">
            <div class="menu-info">
                <span class="menu-title">Репозиторий</span>
                <span class="menu-desc">Просмотр на GitHub</span>
            </div>
            <span>🐙</span>
        </a>
    </div>

    <a href="http://lbs.su" class="footer-link">← На главную lbs.su</a>
</div>

<script>
    if(localStorage.getItem('theme') === 'light') document.documentElement.setAttribute('data-theme', 'light');
    
    function toggleTheme() {
        const d = document.documentElement;
        const t = d.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
        d.setAttribute('data-theme', t);
        localStorage.setItem('theme', t);
    }

    const HOST = 'http://lbs.su/';

    function startDownload(type) {
        const modal = document.getElementById('gen-modal');
        const fill = document.getElementById('progress-fill');
        const title = document.getElementById('gen-title');
        const icon = document.getElementById('gen-icon');

        modal.style.display = 'flex';
        fill.style.width = '20%';
        title.innerText = "Формирование ссылки...";
        icon.innerText = "🔗";

        setTimeout(() => {
            fill.style.width = '100%';
            title.innerText = "Скачивание запущено!";
            title.style.color = "var(--green)";
            icon.innerText = "🚀";

            if (type === 'exe') {
                initiateDownload(HOST + 'pypaint.exe', 'pypaint.exe');
                setTimeout(() => initiateDownload(HOST + 'libs.bat', 'libs.bat'), 800);
            } else {
                initiateDownload(HOST + 'Portable.zip', 'Portable.zip');
            }

            setTimeout(() => {
                modal.style.display = 'none';
                title.style.color = "var(--txt)";
                fill.style.width = '0%';
            }, 2000);
        }, 1200);
    }

    function initiateDownload(url, filename) {
        const a = document.createElement('a');
        a.href = url;
        a.download = filename; 
        a.target = '_blank'; // Открывает запрос в фоне, не уходя со страницы
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
    }
</script>

</body>
</html>
