<body>
	<style type="text/css">
		.found {
			overflow: hidden;
			display: flex;
			flex-direction: column;
			justify-content: center;

			min-height: 100vh;
			padding: 32px;
		}

		.found_image {
			margin-top: 44px;
		}

		.found_image img {
			max-width: 420px;
			height: auto;
			margin: 0 auto;
		}

		.found_title {
			font-size: 120px;
			font-weight: 700;
			text-align: center;

			-webkit-animation: floating 20s ease-in-out infinite;
			   -moz-animation: floating 20s ease-in-out infinite;
				-ms-animation: floating 20s ease-in-out infinite;
				 -o-animation: floating 20s ease-in-out infinite;
					animation: floating 20s ease-in-out infinite;
		}

		.found_subtitle {
			font-size: 18px;
			line-height: 28px;
			text-align: center;
		}

		.found_button {
			padding-top: 8px;
			text-align: center;
		}

		.found_button a {
			display: inline-block;
			position: relative;

			color: #315EFB;
			font-size: 16px;
			text-decoration: none;
		}

		.found_button a:before {
			content: '';
			position: absolute;
			top: -4px;
			right: -4px;
			bottom: 0;

			width: 0;
			background-color: #EEF2F4;
			z-index: -1;

			transition: left .23s ease-out, right .23s ease-out, width .23s ease-out;
		}

		.found_button a:hover:before {
			left: -4px;

			width: calc(100% + 8px);
		}

		@-webkit-keyframes floating {
			0% {
				-webkit-transform: translate(0,0);
			}

			25% {
				-webkit-transform: translate(30px, 15px) rotate(-15deg);
			}

			50% {
				-webkit-transform: translate(-30px, 0px) rotate(4deg);
			}

			75% {
				-webkit-transform: translate(-45px, 15px) rotate(15deg);
			}

			100% {
				-webkit-transform: translate(0, 0);
			}
		}

		@keyframes floating {
			0% {
				transform: translate(0, 0);
			}

			25% {
				transform: translate(30px, 15px) rotate(-15deg);
			}

			50% {
				transform: translate(-30px, 0px) rotate(4deg);
			}

			75% {
				transform: translate(-45px, 15px) rotate(15deg);
			}

			100% {
				transform: translate(0,0);
			}
		}
	</style>
	<div class="found">

		<div class="found_subtitle">Сторінка не існує або була видалена.</div>

		</div>
