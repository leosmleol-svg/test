<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minecraft Сервер</title>
    <style>
        :root {
            --bg-color: #0d1117;
            --panel-bg: #161b22;
            --text-main: #c9d1d9;
            --text-accent: #58a6ff;
            --border-color: #30363d;
            --success-color: #238636;
        }
        
        body {
            font-family: 'Consolas', 'Courier New', monospace;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        
        .container {
            background-color: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 30px;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            position: relative;
        }
        
        h1 {
            color: var(--text-accent);
            font-size: 1.5rem;
            margin-top: 0;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 10px;
        }
        
        .section {
            margin-bottom: 25px;
        }
        
        .section-title {
            color: #8b949e;
            font-size: 0.9rem;
            text-transform: uppercase;
            margin-bottom: 10px;
        }
        
        .ip-box {
            background-color: var(--bg-color);
            border: 1px solid var(--border-color);
            padding: 12px;
            border-radius: 4px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .ip-text {
            font-weight: bold;
            font-size: 1.05rem;
        }
        
        .copy-btn {
            background-color: var(--border-color);
            color: var(--text-main);
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-family: inherit;
            transition: background-color 0.2s;
        }
        
        .copy-btn:hover {
            background-color: #484f58;
        }
        
        .tag {
            display: inline-block;
            background-color: rgba(88, 166, 255, 0.1);
            color: var(--text-accent);
            border: 1px solid rgba(88, 166, 255, 0.4);
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 0.85rem;
            margin-right: 10px;
            margin-bottom: 10px;
        }

        .site-link {
            display: block;
            text-align: center;
            background-color: var(--success-color);
            color: #ffffff;
            text-decoration: none;
            padding: 14px;
            border-radius: 6px;
            font-weight: bold;
            font-size: 1.1rem;
            margin-top: 10px;
            transition: background-color 0.2s;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .site-link:hover {
            background-color: #2ea043;
        }
        
        /* Стили для кастомного уведомления */
        .toast {
            position: absolute;
            top: 20px;
            right: 20px;
            background-color: var(--success-color);
            color: white;
            padding: 10px 20px;
            border-radius: 4px;
            font-size: 0.9rem;
            opacity: 0;
            transform: translateY(-10px);
            transition: opacity 0.3s, transform 0.3s;
            pointer-events: none;
        }
        
        .toast.show {
            opacity: 1;
            transform: translateY(0);
        }
    </style>
</head>
<body>
    <div class="container">
        <div id="toast" class="toast">IP скопирован!</div>
        
        <h1>>_ СЕРВЕР MINECRAFT</h1>
        
        <div class="section">
            <div class="section-title">Информация</div>
            <span class="tag">Версия: 1.21.1</span>
            <span class="tag">Моды: Не требуются</span>
        </div>

        <div class="section">
            <div class="section-title">Стандартные IP</div>
            <div class="ip-box">
                <span class="ip-text">go.gomc.fun</span>
                <button class="copy-btn" onclick="copyIP('go.gomc.fun')">Копировать</button>
            </div>
            <div class="ip-box">
                <span class="ip-text">go.20tps.ru</span>
                <button class="copy-btn" onclick="copyIP('go.20tps.ru')">Копировать</button>
            </div>
        </div>

        <div class="section">
            <div class="section-title">IP с портом (PORT: 25933)</div>
            <div class="ip-box">
                <span class="ip-text">ip-213-152-43-57.joinserver.xyz:25933</span>
                <button class="copy-btn" onclick="copyIP('ip-213-152-43-57.joinserver.xyz:25933')">Копировать</button>
            </div>
            <div class="ip-box">
                <span class="ip-text">213.152.43.57:25933</span>
                <button class="copy-btn" onclick="copyIP('213.152.43.57:25933')">Копировать</button>
            </div>
        </div>
    <script>
        function copyIP(text) {
            navigator.clipboard.writeText(text).then(() => {
                showToast();
            }).catch(err => {
                console.error('Ошибка копирования: ', err);
            });
        }

        function showToast() {
            const toast = document.getElementById('toast');
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 2000);
        }
    </script>
</body>
</html>
