<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Страница не найдена (404) | Упс!</title>
    <style>
        /* Основные стили (Сброс и Шрифт) */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #f4f7f6; /* Светлый, приятный фон */
            color: #333;
            display: flex;
            align-items: center;
            justify-content: center;
            -webkit-font-smoothing: antialiased;
        }

        /* Контейнер по центру */
        .error-container {
            text-align: center;
            padding: 40px;
            background: #fff;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            max-width: 90%;
            width: 480px;
            transition: transform 0.3s ease;
        }

        .error-container:hover {
            transform: translateY(-5px);
        }

        /* Большая цифра 404 */
        .error-code {
            font-size: 120px;
            font-weight: 800;
            line-height: 1;
            margin: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); /* Красивый градиент */
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -5px;
        }

        /* Заголовок */
        h1 {
            font-size: 28px;
            font-weight: 600;
            margin-top: 20px;
            margin-bottom: 10px;
            color: #2d3748;
        }

        /* Описание */
        p {
            font-size: 16px;
            color: #718096;
            line-height: 1.6;
            margin-bottom: 30px;
        }

        /* Кнопка */
        .back-button {
            display: inline-block;
            padding: 12px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            text-decoration: none;
            border-radius: 30px;
            font-weight: 600;
            font-size: 16px;
            box-shadow: 0 4px 15px rgba(118, 75, 162, 0.3);
            transition: all 0.2s ease;
        }

        .back-button:hover {
            box-shadow: 0 6px 20px rgba(118, 75, 162, 0.5);
            transform: translateY(-2px);
        }

        .back-button:active {
            transform: translateY(1px);
        }

        /* Адаптивность для мобильных */
        @media (max-width: 480px) {
            .error-code { font-size: 90px; }
            h1 { font-size: 22px; }
            p { font-size: 14px; }
            .error-container { padding: 30px 20px; }
        }
    </style>
</head>
<body>

    <div class="error-container">
        <div class="error-code">404</div>
        <h1>Страница не найдена</h1>
        <p>Упс! Похоже, адрес, который вы ввели, больше не существует или был перемещен. Проверьте правильность ссылки или вернитесь на главную.</p>
        
        <a href="/" class="back-button">Вернуться на главную</a>
    </div>

</body>
</html>
