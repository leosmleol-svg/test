<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LBS.SU | BASE64 TOOL</title>
    <style>
        :root { --bg: #0a0a0a; --card: #141414; --acc: #00ff88; --txt: #eee; --brd: #222; --item: #1c1c1c; --muted: #777; }
        * { box-sizing: border-box; }
        body { background: var(--bg); color: var(--txt); font-family: -apple-system, system-ui, sans-serif; margin: 0; padding: 15px; display: flex; justify-content: center; min-height: 100vh; }
        .card { background: var(--card); border: 1px solid var(--brd); padding: 25px 20px; border-radius: 24px; width: 100%; max-width: 540px; box-shadow: 0 20px 40px rgba(0,0,0,0.4); align-self: flex-start; margin-top: 10px; }
        .ai-banner { background: rgba(0,255,136,0.05); border: 1px dashed var(--acc); color: var(--acc); padding: 10px; border-radius: 14px; font-size: 11px; text-align: center; font-weight: 800; text-transform: uppercase; margin-bottom: 20px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .header h2 { margin: 0; font-size: 1.4rem; font-weight: 800; }
        .back-link { color: var(--muted); text-decoration: none; font-size: 14px; border: 1px solid #333; padding: 5px 12px; border-radius: 30px; }
        .mode-switch { display: flex; background: var(--item); border-radius: 40px; padding: 4px; margin-bottom: 20px; }
        .mode-btn { flex: 1; padding: 10px; text-align: center; border-radius: 30px; font-weight: 600; font-size: 13px; cursor: pointer; color: var(--muted); }
        .mode-btn.active { background: var(--acc); color: #0a0a0a; }
        .section-title { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); margin: 15px 0 8px 0; }
        textarea, input { width: 100%; background: var(--item); border: 1px solid var(--brd); border-radius: 16px; padding: 14px 16px; color: var(--txt); font-size: 13px; font-family: monospace; outline: none; resize: vertical; }
        textarea { min-height: 120px; }
        .image-preview { text-align: center; margin: 15px 0; padding: 15px; background: #0d0d0d; border-radius: 16px; border: 1px solid var(--brd); }
        .image-preview img { max-width: 100%; max-height: 200px; border-radius: 12px; }
        .placeholder { color: var(--muted); padding: 20px; font-size: 14px; }
        .button-group { display: flex; gap: 8px; margin: 15px 0; flex-wrap: wrap; }
        .btn { background: var(--item); border: 1px solid var(--brd); color: var(--txt); padding: 12px 16px; border-radius: 40px; font-weight: 600; font-size: 13px; cursor: pointer; flex: 1; min-width: 90px; }
        .btn-primary { background: var(--acc); border-color: var(--acc); color: #0a0a0a; }
        .btn-small { padding: 8px 12px; font-size: 11px; }
        .copy-btn { background: transparent; border: 1px solid #333; color: var(--muted); padding: 4px 12px; border-radius: 20px; font-size: 10px; cursor: pointer; }
        .stats { font-size: 11px; color: var(--muted); margin-top: 5px; }
        .error-msg { color: #ff4444; font-size: 12px; margin-top: 8px; padding: 8px 12px; background: rgba(255,68,68,0.1); border-radius: 12px; display: none; }
        .error-msg.show { display: block; }
        .note { font-size: 10px; color: var(--muted); margin-top: 20px; text-align: center; border-top: 1px solid #222; padding-top: 15px; }
        .dropzone { border: 2px dashed #333; border-radius: 20px; padding: 25px; text-align: center; cursor: pointer; margin: 10px 0; }
        .dropzone:hover { border-color: var(--acc); }
        .dropzone input { display: none; }
    </style>
</head>
<body>
<div class="card">
    <div class="ai-banner">📦 BASE64 · ТЕКСТ · КАРТИНКИ · ДЕКОДЕР</div>
    <div class="header"><h2>📦 B64</h2><a href="/" class="back-link">← HUB</a></div>
    
    <div class="mode-switch">
        <div class="mode-btn active" data-mode="text">📝 ТЕКСТ</div>
        <div class="mode-btn" data-mode="encode">🖼️ В КОД</div>
        <div class="mode-btn" data-mode="decode">🔓 ИЗ КОДА</div>
    </div>

    <!-- ТЕКСТОВЫЙ РЕЖИМ -->
    <div id="textMode">
        <div class="section-title">📥 ТЕКСТ</div>
        <textarea id="textInput" placeholder="Введите текст...">Привет, мир!</textarea>
        <div class="button-group">
            <button class="btn btn-primary" id="encodeTextBtn">🔒 В Base64 →</button>
            <button class="btn btn-outline" id="swapTextBtn">⇄</button>
            <button class="btn btn-outline" id="decodeTextBtn">🔓 Из Base64 ←</button>
        </div>
        <div class="section-title">📤 BASE64 <button class="copy-btn" id="copyTextOutput">📋</button></div>
        <textarea id="textOutput" placeholder="Результат..." readonly></textarea>
        <div class="stats" id="textStats">Готово</div>
    </div>

    <!-- КОДИРОВАНИЕ КАРТИНКИ -->
    <div id="encodeMode" style="display:none;">
        <div class="dropzone" id="dropzone">
            <input type="file" id="fileInput" accept="image/*">
            <div>📁 Нажмите или перетащите картинку</div>
            <div style="font-size:11px; margin-top:8px;">или Ctrl+V</div>
        </div>
        <div class="image-preview" id="encodePreview">
            <div class="placeholder">Предпросмотр</div>
        </div>
        <div class="section-title">📤 BASE64 <button class="copy-btn" id="copyEncodeOutput">📋</button></div>
        <textarea id="encodeOutput" placeholder="Base64 код..." readonly></textarea>
        <div class="stats" id="encodeStats"></div>
        <div class="button-group">
            <button class="btn btn-outline" id="downloadEncodedBtn">💾 Скачать</button>
            <button class="btn btn-outline" id="clearEncodeBtn">🗑️ Очистить</button>
        </div>
    </div>

    <!-- ДЕКОДИРОВАНИЕ КАРТИНКИ -->
    <div id="decodeMode" style="display:none;">
        <div class="section-title">📥 BASE64 КАРТИНКИ</div>
        <textarea id="decodeInput" placeholder="Вставьте Base64 (data:image или чистый код)..."></textarea>
        <div class="button-group">
            <button class="btn btn-primary" id="decodeImageBtn">🔓 Декодировать</button>
            <button class="btn btn-outline" id="pasteDecodeBtn">📋 Вставить</button>
            <button class="btn btn-outline" id="clearDecodeBtn">🗑️ Очистить</button>
        </div>
        <div class="image-preview" id="decodePreview">
            <div class="placeholder">Здесь появится картинка</div>
        </div>
        <div class="stats" id="decodeStats"></div>
        <div class="button-group">
            <button class="btn btn-outline" id="downloadDecodedBtn">💾 Скачать картинку</button>
        </div>
        <div class="error-msg" id="decodeError"></div>
    </div>

    <div class="note">⚡ Все функции работают · Текст, картинки в Base64 и обратно</div>
</div>

<script>
(function(){
    // === ЭЛЕМЕНТЫ ===
    const modes = document.querySelectorAll('.mode-btn');
    const textMode = document.getElementById('textMode');
    const encodeMode = document.getElementById('encodeMode');
    const decodeMode = document.getElementById('decodeMode');
    
    // Текст
    const textInput = document.getElementById('textInput');
    const textOutput = document.getElementById('textOutput');
    const textStats = document.getElementById('textStats');
    
    // Кодирование картинки
    const fileInput = document.getElementById('fileInput');
    const dropzone = document.getElementById('dropzone');
    const encodePreview = document.getElementById('encodePreview');
    const encodeOutput = document.getElementById('encodeOutput');
    const encodeStats = document.getElementById('encodeStats');
    
    // Декодирование
    const decodeInput = document.getElementById('decodeInput');
    const decodePreview = document.getElementById('decodePreview');
    const decodeStats = document.getElementById('decodeStats');
    const decodeError = document.getElementById('decodeError');
    
    let currentEncodeImage = null;
    let currentDecodeImage = null;

    // === ПЕРЕКЛЮЧЕНИЕ РЕЖИМОВ ===
    modes.forEach(btn => btn.addEventListener('click', () => {
        modes.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        const mode = btn.dataset.mode;
        textMode.style.display = mode === 'text' ? 'block' : 'none';
        encodeMode.style.display = mode === 'encode' ? 'block' : 'none';
        decodeMode.style.display = mode === 'decode' ? 'block' : 'none';
    }));

    // === ТЕКСТ: КОДИРОВАНИЕ ===
    document.getElementById('encodeTextBtn').addEventListener('click', () => {
        try {
            const text = textInput.value;
            const base64 = btoa(unescape(encodeURIComponent(text)));
            textOutput.value = base64;
            textStats.textContent = `Текст: ${text.length} симв · Base64: ${base64.length} симв`;
        } catch(e) {
            textOutput.value = 'Ошибка кодирования';
        }
    });

    // === ТЕКСТ: ДЕКОДИРОВАНИЕ ===
    document.getElementById('decodeTextBtn').addEventListener('click', () => {
        try {
            const base64 = textOutput.value;
            const text = decodeURIComponent(escape(atob(base64)));
            textInput.value = text;
            textStats.textContent = `Текст: ${text.length} симв · Base64: ${base64.length} симв`;
        } catch(e) {
            textStats.textContent = 'Ошибка: неверный Base64';
        }
    });

    // === ТЕКСТ: SWAP ===
    document.getElementById('swapTextBtn').addEventListener('click', () => {
        const temp = textInput.value;
        textInput.value = textOutput.value;
        textOutput.value = temp;
    });

    // === ТЕКСТ: КОПИРОВАНИЕ ===
    document.getElementById('copyTextOutput').addEventListener('click', () => {
        textOutput.select();
        document.execCommand('copy');
        alert('Скопировано!');
    });

    // === КОДИРОВАНИЕ КАРТИНКИ ===
    function handleImageFile(file) {
        if (!file || !file.type.startsWith('image/')) return;
        const reader = new FileReader();
        reader.onload = e => {
            const dataUrl = e.target.result;
            currentEncodeImage = dataUrl;
            encodePreview.innerHTML = `<img src="${dataUrl}" alt="preview">`;
            encodeOutput.value = dataUrl;
            const sizeKB = (file.size / 1024).toFixed(2);
            encodeStats.textContent = `Размер: ${sizeKB} KB · ${file.type}`;
        };
        reader.readAsDataURL(file);
    }

    fileInput.addEventListener('change', e => handleImageFile(e.target.files[0]));
    
    dropzone.addEventListener('click', () => fileInput.click());
    
    dropzone.addEventListener('dragover', e => { e.preventDefault(); dropzone.style.borderColor = '#00ff88'; });
    dropzone.addEventListener('dragleave', () => dropzone.style.borderColor = '#333');
    dropzone.addEventListener('drop', e => {
        e.preventDefault();
        dropzone.style.borderColor = '#333';
        handleImageFile(e.dataTransfer.files[0]);
    });

    document.getElementById('clearEncodeBtn').addEventListener('click', () => {
        currentEncodeImage = null;
        encodePreview.innerHTML = '<div class="placeholder">Предпросмотр</div>';
        encodeOutput.value = '';
        encodeStats.textContent = '';
        fileInput.value = '';
    });

    document.getElementById('downloadEncodedBtn').addEventListener('click', () => {
        if (!currentEncodeImage) { alert('Нет изображения'); return; }
        const a = document.createElement('a');
        a.href = currentEncodeImage;
        a.download = 'image.png';
        a.click();
    });

    document.getElementById('copyEncodeOutput').addEventListener('click', () => {
        encodeOutput.select();
        document.execCommand('copy');
        alert('Base64 скопирован!');
    });

    // === ДЕКОДИРОВАНИЕ КАРТИНКИ ===
    document.getElementById('decodeImageBtn').addEventListener('click', () => {
        let input = decodeInput.value.trim();
        decodeError.classList.remove('show');
        
        if (!input) {
            decodeError.textContent = 'Вставьте Base64';
            decodeError.classList.add('show');
            return;
        }

        let dataUrl = input;
        if (!input.startsWith('data:image')) {
            // Пробуем определить тип
            let mime = 'image/png';
            if (input.startsWith('/9j/')) mime = 'image/jpeg';
            else if (input.startsWith('iVBOR')) mime = 'image/png';
            else if (input.startsWith('R0lGOD')) mime = 'image/gif';
            dataUrl = `data:${mime};base64,${input}`;
        }

        const img = new Image();
        img.onload = () => {
            currentDecodeImage = dataUrl;
            decodePreview.innerHTML = `<img src="${dataUrl}" alt="decoded">`;
            const raw = dataUrl.split(',')[1] || input;
            const sizeKB = ((raw.length * 0.75) / 1024).toFixed(2);
            decodeStats.textContent = `✓ Декодировано · ~${sizeKB} KB`;
        };
        img.onerror = () => {
            decodeError.textContent = 'Не удалось декодировать. Проверьте Base64.';
            decodeError.classList.add('show');
            decodePreview.innerHTML = '<div class="placeholder">Ошибка декодирования</div>';
            currentDecodeImage = null;
        };
        img.src = dataUrl;
    });

    document.getElementById('downloadDecodedBtn').addEventListener('click', () => {
        if (!currentDecodeImage) {
            decodeError.textContent = 'Сначала декодируйте изображение';
            decodeError.classList.add('show');
            return;
        }
        const a = document.createElement('a');
        a.href = currentDecodeImage;
        a.download = 'decoded.png';
        a.click();
    });

    document.getElementById('pasteDecodeBtn').addEventListener('click', async () => {
        try {
            const text = await navigator.clipboard.readText();
            decodeInput.value = text;
        } catch(e) {
            alert('Не удалось вставить');
        }
    });

    document.getElementById('clearDecodeBtn').addEventListener('click', () => {
        decodeInput.value = '';
        decodePreview.innerHTML = '<div class="placeholder">Здесь появится картинка</div>';
        decodeStats.textContent = '';
        currentDecodeImage = null;
        decodeError.classList.remove('show');
    });

    // === ВСТАВКА ИЗ БУФЕРА (Ctrl+V) для картинок ===
    document.addEventListener('paste', e => {
        const items = e.clipboardData?.items;
        if (!items) return;
        
        for (let item of items) {
            if (item.type.startsWith('image/')) {
                e.preventDefault();
                const file = item.getAsFile();
                
                // Определяем активный режим
                if (encodeMode.style.display !== 'none') {
                    handleImageFile(file);
                } else if (decodeMode.style.display !== 'none') {
                    const reader = new FileReader();
                    reader.onload = ev => {
                        decodeInput.value = ev.target.result;
                    };
                    reader.readAsDataURL(file);
                }
                break;
            }
        }
    });

    // === ПРИМЕР ДЛЯ ДЕКОДЕРА (маленький красный квадрат) ===
    const demoBase64 = 'iVBORw0KGgoAAAANSUhEUgAAABAAAAAQCAYAAAAf8/9hAAAAAXNSR0IArs4c6QAAAARnQU1BAACxjwv8YQUAAAAJcEhZcwAADsMAAA7DAcdvqGQAAAAZdEVYdFNvZnR3YXJlAHBhaW50Lm5ldCA0LjAuMTM0A1t6AAAAU0lEQVQ4T2P8z0ABYIILMDIwMlVM/fv/HwPD/xkZqhj//P3H8F+6gonhPwPD////GBj+/2dg+P+f4f8vBoZ/DAz//zP8/8/w/8d/BpY/DAzMDAwMAMh2LrCZFapMAAAAAElFTkSuQmCC';
    
    // Заполняем пример при загрузке если поле пустое
    setTimeout(() => {
        if (decodeInput.value === '') {
            // Не заполняем автоматически, просто оставляем плейсхолдер
        }
    }, 100);

    // Запускаем кодирование текста при загрузке
    document.getElementById('encodeTextBtn').click();

})();
</script>
</body>
</html>
