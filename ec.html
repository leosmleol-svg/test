<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LBS.SU | EC (Encrypt/Decrypt)</title>
    <!-- CryptoJS для шифрования -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <style>
        :root {
            --bg: #0a0a0a;
            --card: #141414;
            --acc: #00ff88;
            --txt: #eee;
            --brd: #222;
            --item: #1c1c1c;
            --muted: #777;
            --warn: #ffaa00;
        }

        * {
            box-sizing: border-box;
        }

        body {
            background: var(--bg);
            color: var(--txt);
            font-family: -apple-system, system-ui, sans-serif;
            margin: 0;
            padding: 15px;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .card {
            background: var(--card);
            border: 1px solid var(--brd);
            padding: 25px 20px;
            border-radius: 24px;
            width: 100%;
            max-width: 480px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            align-self: flex-start;
            margin-top: 10px;
        }

        .ai-banner {
            background: rgba(0, 255, 136, 0.05);
            border: 1px dashed var(--acc);
            color: var(--acc);
            padding: 10px;
            border-radius: 14px;
            font-size: 11px;
            text-align: center;
            font-weight: 800;
            text-transform: uppercase;
            margin-bottom: 20px;
            letter-spacing: 1px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }
        .header h2 {
            margin: 0;
            font-size: 1.4rem;
            font-weight: 800;
        }
        .back-link {
            color: var(--muted);
            text-decoration: none;
            font-size: 14px;
            border: 1px solid #333;
            padding: 5px 12px;
            border-radius: 30px;
            transition: 0.2s;
        }
        .back-link:hover {
            border-color: var(--acc);
            color: var(--acc);
        }

        .section-title {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--muted);
            margin: 20px 0 8px 0;
        }

        textarea, input {
            width: 100%;
            background: var(--item);
            border: 1px solid var(--brd);
            border-radius: 16px;
            padding: 14px 16px;
            color: var(--txt);
            font-size: 15px;
            font-family: inherit;
            resize: vertical;
            outline: none;
            transition: 0.2s;
        }
        textarea:focus, input:focus {
            border-color: var(--acc);
            box-shadow: 0 0 0 2px rgba(0,255,136,0.1);
        }
        textarea {
            min-height: 120px;
        }

        .key-row {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .key-row input {
            flex: 1;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin: 20px 0 15px;
        }
        .btn {
            background: var(--item);
            border: 1px solid var(--brd);
            color: var(--txt);
            padding: 12px 18px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            flex: 1;
            transition: 0.2s;
            text-align: center;
        }
        .btn-primary {
            background: var(--acc);
            border-color: var(--acc);
            color: #0a0a0a;
            font-weight: 700;
        }
        .btn-primary:hover {
            opacity: 0.9;
            box-shadow: 0 0 12px rgba(0,255,136,0.3);
        }
        .btn-outline:hover {
            border-color: var(--acc);
            background: #222;
        }

        .result-area {
            margin-top: 10px;
        }
        .result-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
        }
        .copy-btn {
            background: transparent;
            border: 1px solid #333;
            color: var(--muted);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            cursor: pointer;
            transition: 0.2s;
        }
        .copy-btn:hover {
            border-color: var(--acc);
            color: var(--acc);
        }

        .note {
            font-size: 11px;
            color: var(--muted);
            margin-top: 20px;
            text-align: center;
            border-top: 1px solid #222;
            padding-top: 15px;
        }

        .mode-switch {
            display: flex;
            background: var(--item);
            border-radius: 40px;
            padding: 4px;
            margin-bottom: 15px;
        }
        .mode-btn {
            flex: 1;
            padding: 8px;
            text-align: center;
            border-radius: 30px;
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
            color: var(--muted);
            transition: 0.2s;
        }
        .mode-btn.active {
            background: var(--acc);
            color: #0a0a0a;
        }

        /* Сообщение об ошибке расшифровки */
        .decrypt-error {
            background: rgba(255, 170, 0, 0.1);
            border: 1px solid var(--warn);
            color: var(--warn);
            padding: 10px 14px;
            border-radius: 12px;
            font-size: 13px;
            margin-top: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .decrypt-error.hidden {
            display: none;
        }
    </style>
</head>
<body>

<div class="card">
    <div class="ai-banner">⚡ AES-256 · РАСШИФРОВКА ВСЕГДА РАБОТАЕТ ⚡</div>

    <div class="header">
        <h2>🔐 EC.TOOL</h2>
        <a href="/" class="back-link">← HUB</a>
    </div>

    <!-- Переключатель режима -->
    <div class="mode-switch" id="modeSwitch">
        <div class="mode-btn active" data-mode="encrypt">🔒 Шифровать</div>
        <div class="mode-btn" data-mode="decrypt">🔓 Расшифровать</div>
    </div>

    <!-- Секретный ключ -->
    <div class="section-title">🔑 СЕКРЕТНЫЙ КЛЮЧ</div>
    <div class="key-row">
        <input type="text" id="secretKey" placeholder="Введите ключ (любая фраза)" value="мой_секрет_123">
    </div>

    <!-- Входные данные -->
    <div class="section-title" id="inputLabel">📥 ТЕКСТ ДЛЯ ШИФРОВАНИЯ</div>
    <textarea id="inputText" placeholder="Введите текст...">Привет, это секретное сообщение!</textarea>

    <!-- Кнопки действий -->
    <div class="button-group">
        <button class="btn btn-primary" id="actionBtn">🔒 ЗАШИФРОВАТЬ</button>
        <button class="btn btn-outline" id="swapBtn">🔄</button>
    </div>

    <!-- Результат -->
    <div class="result-area">
        <div class="result-header">
            <span class="section-title" style="margin:0;" id="resultLabel">🔐 РЕЗУЛЬТАТ</span>
            <button class="copy-btn" id="copyResultBtn">📋 Копировать</button>
        </div>
        <textarea id="outputText" placeholder="Результат появится здесь..." readonly></textarea>
    </div>

    <!-- Блок для отображения ошибки расшифровки (изначально скрыт) -->
    <div id="decryptErrorBox" class="decrypt-error hidden">
        <span>⚠️</span>
        <span id="decryptErrorMsg">Неверный ключ или данные повреждены</span>
    </div>

    <div class="note">
        ⚠️ Данные не покидают ваш браузер. AES-256 + CryptoJS.<br>
        <span style="color: var(--acc);">✓ Даже с неверным ключом — вы увидите сообщение, а не краш.</span>
    </div>
</div>

<script>
    (function(){
        // DOM элементы
        const modeBtns = document.querySelectorAll('.mode-btn');
        const inputLabel = document.getElementById('inputLabel');
        const actionBtn = document.getElementById('actionBtn');
        const inputText = document.getElementById('inputText');
        const outputText = document.getElementById('outputText');
        const secretKey = document.getElementById('secretKey');
        const swapBtn = document.getElementById('swapBtn');
        const copyBtn = document.getElementById('copyResultBtn');
        const resultLabel = document.getElementById('resultLabel');
        const errorBox = document.getElementById('decryptErrorBox');
        const errorMsg = document.getElementById('decryptErrorMsg');

        let currentMode = 'encrypt'; // 'encrypt' или 'decrypt'

        // Скрыть ошибку
        function hideError() {
            errorBox.classList.add('hidden');
        }

        // Показать ошибку с текстом
        function showError(text) {
            errorMsg.textContent = text;
            errorBox.classList.remove('hidden');
        }

        // Обновление интерфейса при смене режима
        function updateUIMode() {
            hideError(); // скрываем старую ошибку при переключении
            if (currentMode === 'encrypt') {
                inputLabel.textContent = '📥 ТЕКСТ ДЛЯ ШИФРОВАНИЯ';
                actionBtn.textContent = '🔒 ЗАШИФРОВАТЬ';
                resultLabel.textContent = '🔐 ЗАШИФРОВАННЫЙ ТЕКСТ';
            } else {
                inputLabel.textContent = '📥 ЗАШИФРОВАННЫЙ ТЕКСТ (Base64)';
                actionBtn.textContent = '🔓 РАСШИФРОВАТЬ';
                resultLabel.textContent = '📄 РАСШИФРОВАННЫЙ ТЕКСТ';
            }
            modeBtns.forEach(btn => {
                const mode = btn.dataset.mode;
                if (mode === currentMode) {
                    btn.classList.add('active');
                } else {
                    btn.classList.remove('active');
                }
            });
        }

        // Обработчики переключения режима
        modeBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                const mode = btn.dataset.mode;
                if (mode !== currentMode) {
                    currentMode = mode;
                    updateUIMode();
                }
            });
        });

        // Шифрование AES
        function encryptAES(text, key) {
            if (!text || !key) return '';
            try {
                const encrypted = CryptoJS.AES.encrypt(text, key).toString();
                return encrypted;
            } catch (e) {
                return '❌ Ошибка шифрования: ' + e.message;
            }
        }

        // МЯГКАЯ расшифровка AES — всегда возвращает строку, даже если ключ неверный
        function decryptAESSafe(ciphertext, key) {
            if (!ciphertext || !key) {
                return '⚠️ Введите зашифрованный текст и ключ';
            }

            try {
                const bytes = CryptoJS.AES.decrypt(ciphertext, key);
                const originalText = bytes.toString(CryptoJS.enc.Utf8);
                
                // Проверяем, получилось ли что-то осмысленное
                if (!originalText) {
                    // Пустая строка — скорее всего неверный ключ или битые данные
                    showError('🔓 Неверный ключ или данные не являются корректным шифротекстом AES.');
                    return '[ОШИБКА РАСШИФРОВКИ] Не удалось расшифровать. Проверьте ключ или формат данных.';
                }
                
                // Успешно расшифровано
                hideError();
                return originalText;
            } catch (e) {
                // Любая ошибка ловится, инструмент не падает
                showError('🔓 Ошибка: ' + e.message);
                return '[КРИТИЧЕСКАЯ ОШИБКА] Невозможно обработать данные. Возможно, они повреждены.';
            }
        }

        // Основное действие
        function performAction() {
            const key = secretKey.value.trim();
            const input = inputText.value.trim();

            if (!key) {
                outputText.value = '⚠️ Введите секретный ключ!';
                hideError();
                return;
            }
            if (!input) {
                outputText.value = '⚠️ Введите текст для обработки!';
                hideError();
                return;
            }

            if (currentMode === 'encrypt') {
                hideError();
                const encrypted = encryptAES(input, key);
                outputText.value = encrypted;
            } else {
                // Режим расшифровки с защитой от падений
                const decrypted = decryptAESSafe(input, key);
                outputText.value = decrypted;
            }
        }

        // Поменять местами input и output
        function swapFields() {
            const temp = inputText.value;
            inputText.value = outputText.value;
            outputText.value = temp;
            hideError(); // при свапе ошибка теряет актуальность
        }

        // Копирование результата
        function copyResult() {
            if (!outputText.value) {
                alert('Нет данных для копирования');
                return;
            }
            outputText.select();
            navigator.clipboard?.writeText(outputText.value).catch(() => {
                document.execCommand('copy');
            });
            copyBtn.textContent = '✅ Скопировано!';
            setTimeout(() => {
                copyBtn.textContent = '📋 Копировать';
            }, 1500);
        }

        // Привязка событий
        actionBtn.addEventListener('click', performAction);
        swapBtn.addEventListener('click', swapFields);
        copyBtn.addEventListener('click', copyResult);

        // Enter в поле ввода (Ctrl+Enter)
        inputText.addEventListener('keydown', (e) => {
            if (e.ctrlKey && e.key === 'Enter') {
                performAction();
            }
        });

        // Скрываем ошибку при изменении ключа или входных данных
        secretKey.addEventListener('input', hideError);
        inputText.addEventListener('input', hideError);

        // Инициализация
        updateUIMode();
        hideError();
    })();
</script>
</body>
</html>
