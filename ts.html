<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LBS.SU | TIMESTAMP</title>
    <style>
        :root { --bg: #0a0a0a; --card: #141414; --acc: #00ff88; --txt: #eee; --brd: #222; --item: #1c1c1c; --muted: #777; }
        * { box-sizing: border-box; }
        body { background: var(--bg); color: var(--txt); font-family: -apple-system, system-ui, monospace; margin: 0; padding: 15px; display: flex; justify-content: center; min-height: 100vh; }
        .card { background: var(--card); border: 1px solid var(--brd); padding: 25px 20px; border-radius: 24px; width: 100%; max-width: 500px; box-shadow: 0 20px 40px rgba(0,0,0,0.4); align-self: flex-start; margin-top: 10px; }
        .ai-banner { background: rgba(0,255,136,0.05); border: 1px dashed var(--acc); color: var(--acc); padding: 10px; border-radius: 14px; font-size: 11px; text-align: center; font-weight: 800; text-transform: uppercase; margin-bottom: 20px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .header h2 { margin: 0; font-size: 1.4rem; font-weight: 800; }
        .back-link { color: var(--muted); text-decoration: none; font-size: 14px; border: 1px solid #333; padding: 5px 12px; border-radius: 30px; }
        .section-title { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); margin: 20px 0 10px 0; }
        .big-display { background: #0d0d0d; border: 1px solid var(--brd); border-radius: 20px; padding: 20px; text-align: center; }
        .timestamp-val { font-size: 36px; font-weight: 900; color: var(--acc); word-break: break-all; }
        .datetime-val { font-size: 18px; margin-top: 10px; color: var(--txt); }
        .relative-val { font-size: 14px; color: var(--muted); margin-top: 5px; }
        input { width: 100%; background: var(--item); border: 1px solid var(--brd); border-radius: 16px; padding: 14px 16px; color: var(--txt); font-size: 16px; font-family: monospace; outline: none; }
        .button-group { display: flex; gap: 10px; margin: 15px 0; }
        .btn { background: var(--item); border: 1px solid var(--brd); color: var(--txt); padding: 12px 18px; border-radius: 40px; font-weight: 600; font-size: 14px; cursor: pointer; flex: 1; }
        .btn-primary { background: var(--acc); border-color: var(--acc); color: #0a0a0a; }
        .unit-toggle { display: flex; gap: 10px; margin-bottom: 15px; }
        .unit-btn { flex: 1; padding: 8px; background: var(--item); border: 1px solid var(--brd); border-radius: 30px; font-size: 12px; cursor: pointer; text-align: center; }
        .unit-btn.active { background: var(--acc); color: #0a0a0a; }
        .copy-btn { background: transparent; border: 1px solid #333; color: var(--muted); padding: 4px 12px; border-radius: 20px; font-size: 10px; cursor: pointer; }
        .note { font-size: 10px; color: var(--muted); margin-top: 20px; text-align: center; border-top: 1px solid #222; padding-top: 15px; }
    </style>
</head>
<body>
<div class="card">
    <div class="ai-banner">⏱️ TIMESTAMP · UNIX ВРЕМЯ И ОБРАТНО</div>
    <div class="header"><h2>⏱️ TS</h2><a href="/" class="back-link">← HUB</a></div>
    
    <div class="big-display">
        <div class="timestamp-val" id="currentTimestamp">1734567890</div>
        <div class="datetime-val" id="currentDatetime">01.01.2025 00:00:00</div>
        <div class="relative-val" id="relativeTime">сейчас</div>
    </div>

    <div class="unit-toggle">
        <span class="unit-btn active" data-unit="s">Секунды</span>
        <span class="unit-btn" data-unit="ms">Миллисекунды</span>
    </div>

    <div class="button-group">
        <button class="btn btn-primary" onclick="setNow()">🕐 СЕЙЧАС</button>
        <button class="btn btn-outline" onclick="copyTimestamp()">📋 КОПИРОВАТЬ</button>
    </div>

    <div class="section-title">🔽 UNIX → ДАТА</div>
    <input type="text" id="unixInput" placeholder="Введите Unix timestamp...">
    <button class="btn btn-outline" style="margin-top:10px;" onclick="convertUnixToDate()">Конвертировать →</button>

    <div class="section-title">🔼 ДАТА → UNIX</div>
    <input type="datetime-local" id="dateInput">
    <button class="btn btn-outline" style="margin-top:10px;" onclick="convertDateToUnix()">← Конвертировать</button>

    <div class="note">⚡ Секунды / миллисекунды · Текущее время · Конвертация в обе стороны</div>
</div>

<script>
    let currentUnit = 's';
    const unitBtns = document.querySelectorAll('.unit-btn');
    unitBtns.forEach(btn => btn.addEventListener('click', () => {
        unitBtns.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentUnit = btn.dataset.unit;
        updateDisplay();
    }));

    function getNow() { return currentUnit === 's' ? Math.floor(Date.now() / 1000) : Date.now(); }
    function formatDate(ts) { 
        const d = new Date(currentUnit === 's' ? ts * 1000 : ts); 
        return d.toLocaleString('ru-RU', { day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit', second:'2-digit' }); 
    }
    function relativeTime(ts) {
        const now = Date.now();
        const diff = now - (currentUnit === 's' ? ts * 1000 : ts);
        const abs = Math.abs(diff);
        const seconds = Math.floor(abs / 1000);
        if (seconds < 60) return seconds + ' сек. ' + (diff > 0 ? 'назад' : 'через');
        if (seconds < 3600) return Math.floor(seconds/60) + ' мин. ' + (diff > 0 ? 'назад' : 'через');
        if (seconds < 86400) return Math.floor(seconds/3600) + ' ч. ' + (diff > 0 ? 'назад' : 'через');
        return Math.floor(seconds/86400) + ' дн. ' + (diff > 0 ? 'назад' : 'через');
    }

    function updateDisplay() {
        const ts = getNow();
        document.getElementById('currentTimestamp').textContent = ts;
        document.getElementById('currentDatetime').textContent = formatDate(ts);
        document.getElementById('relativeTime').textContent = relativeTime(ts);
        document.getElementById('unixInput').value = ts;
    }

    function setNow() { updateDisplay(); }
    function copyTimestamp() { navigator.clipboard?.writeText(document.getElementById('currentTimestamp').textContent); }

    function convertUnixToDate() {
        let ts = parseInt(document.getElementById('unixInput').value);
        if (isNaN(ts)) return;
        document.getElementById('currentTimestamp').textContent = ts;
        document.getElementById('currentDatetime').textContent = formatDate(ts);
        document.getElementById('relativeTime').textContent = relativeTime(ts);
        const d = new Date(currentUnit === 's' ? ts * 1000 : ts);
        document.getElementById('dateInput').value = d.toISOString().slice(0,16);
    }

    function convertDateToUnix() {
        const dateStr = document.getElementById('dateInput').value;
        if (!dateStr) return;
        const d = new Date(dateStr);
        const ts = currentUnit === 's' ? Math.floor(d.getTime() / 1000) : d.getTime();
        document.getElementById('currentTimestamp').textContent = ts;
        document.getElementById('currentDatetime').textContent = formatDate(ts);
        document.getElementById('relativeTime').textContent = relativeTime(ts);
        document.getElementById('unixInput').value = ts;
    }

    document.getElementById('unixInput').addEventListener('change', convertUnixToDate);
    updateDisplay();
</script>
</body>
</html>
