<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Файл временно недоступен</title>
    <style>
        :root {
            --bg-color: #0d1117;
            --container-bg: #161b22;
            --border-color: #30363d;
            --text-primary: #c9d1d9;
            --text-secondary: #8b949e;
            --accent-color: #58a6ff;
            --accent-hover: #1f6feb;
            --error-color: #f85149;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background-color: var(--container-bg);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 40px;
            text-align: center;
            max-width: 450px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
        }

        .icon {
            font-size: 48px;
            color: var(--error-color);
            margin-bottom: 20px;
        }

        h1 {
            font-size: 24px;
            margin-bottom: 10px;
            font-weight: 600;
        }

        p {
            color: var(--text-secondary);
            line-height: 1.5;
            margin-bottom: 30px;
        }

        .divider {
            height: 1px;
            background-color: var(--border-color);
            margin: 20px 0;
        }

        .beta-box {
            font-size: 14px;
        }

        .btn {
            display: inline-block;
            background-color: var(--accent-color);
            color: #ffffff;
            text-decoration: none;
            padding: 10px 20px;
            border-radius: 6px;
            font-weight: 500;
            transition: background-color 0.2s;
        }

        .btn:hover {
            background-color: var(--accent-hover);
        }

        code {
            background-color: rgba(110, 118, 129, 0.2);
            padding: 2px 5px;
            border-radius: 4px;
            font-family: ui-monospace, SFMono-Regular, SF Mono, Menlo, Consolas, Liberation Mono, monospace;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="icon">⚠</div>
    <h1>Файл временно недоступен</h1>
    <p>Запрашиваемый ресурс сейчас находится на техническом обслуживании или обновляется. Пожалуйста, попробуйте позже.</p>
    
    <div class="divider"></div>

    <div class="beta-box">
        <p>Если вы участвуете в программе <code>beta-test</code>, вы можете воспользоваться предварительной версией:</p>
        <a href="https://e.pcloud.link/publink/show?code=XZpXRiZEC0bAv6Sq85aIEO8PoNVz0x3jUQ7" class="btn">Перейти к бета-тесту</a>
    </div>
</div>

</body>
</html>
