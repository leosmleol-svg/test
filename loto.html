<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Loto Check — RedictStyle</title>
    <style>
        :root[data-theme="dark"] { --bg: #0a0a0a; --card: #141414; --acc: #00ff88; --txt: #eee; --brd: #222; --item: #1c1c1c; --muted: #777; }
        :root[data-theme="light"] { --bg: #f8f9fa; --card: #fff; --acc: #007bff; --txt: #222; --brd: #eaeaea; --item: #f1f3f5; --muted: #999; }
        
        body { background: var(--bg); color: var(--txt); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 0; padding: 15px; display: flex; justify-content: center; align-items: center; min-height: 100vh; box-sizing: border-box; }
        .card { background: var(--card); border: 1px solid var(--brd); padding: 25px; border-radius: 24px; width: 100%; max-width: 400px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        
        .header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        h2 { margin: 0; font-size: 1.4rem; font-weight: 800; }
        
        input { background: var(--bg); border: 1px solid var(--brd); padding: 15px; border-radius: 14px; color: var(--txt); width: 100%; box-sizing: border-box; outline: none; margin-bottom: 12px; font-size: 16px; transition: border-color 0.2s; }
        input:focus { border-color: var(--acc); }
        
        .btn { padding: 16px; border-radius: 14px; cursor: pointer; font-weight: 700; border: none; font-size: 15px; transition: 0.2s; width: 100%; -webkit-tap-highlight-color: transparent; }
        .btn-primary { background: var(--acc); color: #000; margin-bottom: 10px; }
        .btn-primary:active { transform: scale(0.98); }
        .btn-outline { background: var(--item); border: 1px solid var(--brd); color: var(--txt); text-decoration: none; display: block; text-align: center; font-size: 13px; padding: 10px; }

        #loader { display: none; text-align: center; margin: 20px 0; color: var(--acc); font-weight: 600; font-size: 14px; }
        
        #result { display: none; background: var(--item); padding: 20px; border-radius: 18px; margin-top: 15px; border: 1px solid var(--brd); text-align: center; animation: slideUp 0.4s ease; }
        .win-label { color: var(--muted); font-size: 12px; text-transform: uppercase; letter-spacing: 1px; }
        .win-amount { display: block; font-size: 32px; color: var(--acc); font-weight: 800; margin: 10px 0; }

        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="card">
    <div class="header-top">
        <h2>Стодубли</h2>
        <button onclick="toggleTheme()" style="background:none; border:none; cursor:pointer; font-size:1.2rem;">🌓</button>
    </div>

    <div id="main-form">
        <input type="number" id="draw" placeholder="Номер тиража">
        <input type="number" id="ticket" placeholder="Номер билета">
        <button class="btn btn-primary" onclick="checkTicket()">Проверить выигрыш</button>
        <a href="https://leo-lbs.ru" class="btn btn-outline">Вернуться на leo-lbs.ru</a>
    </div>

    <div id="loader">⏳ Проверка в базе данных...</div>

    <div id="result">
        <span class="win-label">Ваш выигрыш составляет:</span>
        <span class="win-amount" id="amount">0 дублей</span>
        <p style="font-size: 13px; color: var(--muted); margin-bottom: 0;">Выигрыш зачислен на ваш ID</p>
    </div>
</div>

<script>
    // Система тем как в RedictHub
    if(localStorage.getItem('theme') === 'light') document.documentElement.setAttribute('data-theme', 'light');
    
    function toggleTheme() {
        const d = document.documentElement;
        const t = d.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
        d.setAttribute('data-theme', t);
        localStorage.setItem('theme', t);
    }

    function checkTicket() {
        const ticket = document.getElementById('ticket').value;
        const loader = document.getElementById('loader');
        const result = document.getElementById('result');
        const amountDisplay = document.getElementById('amount');

        if (!ticket) {
            alert("Введите номер билета");
            return;
        }

        result.style.display = 'none';
        loader.style.display = 'block';

        setTimeout(() => {
            loader.style.display = 'none';
            
            // Генерация суммы от 5 000 до 10 000 000
            const win = Math.floor(Math.random() * (10000000 - 5000 + 1)) + 5000;
            const formatted = win.toString().replace(/\B(?=(\d{3})+(?!\d))/g, " ");

            amountDisplay.innerText = formatted + " дублей";
            result.style.display = 'block';
        }, 1500);
    }
</script>

</body>
</html>
