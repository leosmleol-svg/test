<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HTML Редактор — RedictStyle</title>
    <style>
        /* Оригинальная палитра RedictStyle */
        :root[data-theme="dark"] { 
            --bg: #0a0a0a; --card: #141414; --acc: #00ff88; --txt: #eee; 
            --brd: #222; --item: #1c1c1c; --muted: #777; --btn-hover: #1f1f1f; 
        }
        :root[data-theme="light"] { 
            --bg: #f8f9fa; --card: #fff; --acc: #007bff; --txt: #222; 
            --brd: #eaeaea; --item: #f1f3f5; --muted: #999; --btn-hover: #e9ecef; 
        }
        
        body { 
            background: var(--bg); 
            color: var(--txt); 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            margin: 0; 
            padding: 15px; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            box-sizing: border-box; 
        }

        .container {
            width: 100%;
            max-width: 900px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .card { 
            background: var(--card); 
            border: 1px solid var(--brd); 
            padding: 25px; 
            border-radius: 24px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.2); 
        }
        
        .header-top { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 20px; 
        }

        h2 { margin: 0; font-size: 1.4rem; font-weight: 800; letter-spacing: -0.5px; }
        
        /* Стили редактора */
        .editor-section {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
        }

        @media (min-width: 768px) {
            .editor-section { grid-template-columns: 1fr 1fr; }
        }

        .box-label {
            font-size: 12px;
            font-weight: 700;
            color: var(--acc);
            margin-bottom: 8px;
            text-transform: uppercase;
            display: block;
        }

        textarea, iframe {
            width: 100%;
            height: 300px;
            background: var(--item);
            border: 1px solid var(--brd);
            border-radius: 18px;
            padding: 15px;
            color: var(--txt);
            font-family: 'Fira Code', 'Courier New', monospace;
            font-size: 14px;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.2s;
        }

        textarea:focus { border-color: var(--acc); }

        iframe { background: white; border: none; }

        .controls {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .btn {
            flex: 1;
            background: var(--item);
            border: 1px solid var(--brd);
            padding: 12px;
            border-radius: 14px;
            color: var(--txt);
            font-weight: 700;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn:active { transform: scale(0.98); }
        .btn:hover { background: var(--btn-hover); border-color: var(--acc); }
        .btn-primary { color: var(--acc); }

        .footer-link { 
            margin-top: 10px; 
            display: block; 
            text-align: center; 
            color: var(--muted); 
            text-decoration: none; 
            font-size: 13px; 
            transition: 0.2s; 
        }
        .footer-link:hover { color: var(--acc); }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <div class="header-top">
            <h2>HTML Редактор</h2>
            <button onclick="toggleTheme()" style="background:none; border:none; cursor:pointer; font-size:1.2rem;">🌓</button>
        </div>

        <div class="editor-section">
            <div>
                <span class="box-label">Код</span>
                <textarea id="html-code" placeholder="Введите HTML/CSS код здесь..." spellcheck="false"><h1>Привет!</h1>
<p>Это редактор в стиле RedictStyle.</p>

<style>
  h1 { color: #00ff88; font-family: sans-serif; }
</style></textarea>
            </div>
            <div>
                <span class="box-label">Результат</span>
                <iframe id="preview"></iframe>
            </div>
        </div>

        <div class="controls">
            <button class="btn btn-primary" onclick="runCode()">Запустить</button>
            <button class="btn" onclick="clearCode()">Очистить</button>
        </div>

        <a href="https://leo-lbs.ru" class="footer-link">Вернуться на главную</a>
    </div>
</div>

<script>
    const codeArea = document.getElementById('html-code');
    const previewFrame = document.getElementById('preview');

    // Функция запуска кода
    function runCode() {
        const content = codeArea.value;
        const frameDoc = previewFrame.contentDocument || previewFrame.contentWindow.document;
        frameDoc.open();
        frameDoc.write(content);
        frameDoc.close();
    }

    // Очистка
    function clearCode() {
        codeArea.value = '';
        runCode();
    }

    // Авто-запуск при вводе
    codeArea.addEventListener('input', runCode);

    // Запуск при загрузке
    window.onload = runCode;

    // Логика темы
    if(localStorage.getItem('theme') === 'light') document.documentElement.setAttribute('data-theme', 'light');
    
    function toggleTheme() {
        const d = document.documentElement;
        const t = d.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
        d.setAttribute('data-theme', t);
        localStorage.setItem('theme', t);
    }
</script>

</body>
</html>
