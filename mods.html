<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LBS.SU - Mod Distribution</title>
    <style>
        :root { 
            --bg: #0d1117; 
            --panel: #161b22; 
            --border: #30363d; 
            --accent: #58a6ff; 
            --text: #c9d1d9; 
            --green: #7ee787; 
            --yellow: #d29922;
        }

        body { 
            font-family: 'Consolas', 'Monaco', monospace; 
            background: var(--bg); 
            color: var(--text); 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            overflow: hidden;
        }

        .ide-card { 
            width: 480px; 
            background: var(--panel); 
            border: 1px solid var(--border); 
            border-radius: 8px; 
            overflow: hidden; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
        }

        header { 
            background: #21262d; 
            padding: 12px 15px; 
            border-bottom: 1px solid var(--border); 
            display: flex; 
            align-items: center; 
            gap: 10px; 
        }

        .dot { width: 12px; height: 12px; border-radius: 50%; }
        .red { background: #f85149; }
        .yellow { background: var(--yellow); }
        .green { background: #3fb950; }

        .content { padding: 30px 25px; }

        h1 { font-size: 20px; color: var(--accent); margin: 0; text-align: center; letter-spacing: 2px; }
        .subtitle { font-size: 11px; color: #8b949e; text-align: center; margin-bottom: 25px; }

        .action-list { display: flex; flex-direction: column; gap: 8px; }

        .action-link { 
            display: flex; 
            align-items: center; 
            background: var(--bg); 
            border: 1px solid var(--border); 
            padding: 12px 15px; 
            border-radius: 6px; 
            text-decoration: none; 
            color: var(--text); 
            font-size: 13px; 
            transition: all 0.2s ease; 
            cursor: pointer;
        }

        .action-link:hover { 
            border-color: var(--accent); 
            background: #1c2128; 
            transform: translateX(5px); 
        }

        .tag { margin-left: auto; font-size: 10px; padding: 2px 6px; border-radius: 4px; background: rgba(88,166,255,0.1); color: var(--accent); }

        /* ОКНО ГЕНЕРАЦИИ (MODAL) */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.92);
            backdrop-filter: blur(10px);
            display: none; 
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-box {
            background: var(--panel);
            border: 1px solid var(--border);
            padding: 40px;
            border-radius: 12px;
            text-align: center;
            width: 400px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.7);
        }

        .modal-gif { height: 26px; margin-bottom: 20px; }
        .modal-title { color: var(--accent); font-size: 15px; margin-bottom: 10px; font-weight: bold; }
        .modal-bar { color: var(--yellow); font-weight: bold; font-size: 14px; letter-spacing: 2px; }

        .footer-status { 
            background: #21262d; 
            padding: 8px 15px; 
            font-size: 11px; 
            border-top: 1px solid var(--border); 
            color: #8b949e; 
            display: flex; 
            justify-content: space-between; 
        }
    </style>
</head>
<body>

<div id="gen-modal" class="modal-overlay">
    <div class="modal-box">
        <img src="https://lbs.su/load.gif" class="modal-gif" alt="loading">
        <div id="gen-title" class="modal-title">Инициализация архива...</div>
        <div id="gen-bar" class="modal-bar">[------------------]</div>
        <div style="font-size: 10px; color: #444; margin-top: 20px; letter-spacing: 1px;">MOD_LOADER_ACCESS: LBS.SU</div>
    </div>
</div>

<div class="ide-card">
    <header>
        <div class="dot red"></div><div class="dot yellow"></div><div class="dot green"></div>
        <span style="margin-left: 10px; font-size: 12px; color: #8b949e;">mods_distribution.py</span>
    </header>

    <div class="content">
        <h1>MODS PACK</h1>
        <div class="subtitle">// repository: lbs.su/mods.zip</div>
        
        <nav class="action-list">
            <div onclick="startDownload()" class="action-link">
                <span>📦 Download mods.zip</span>
                <span class="tag" style="color:var(--green)">[STABLE]</span>
            </div>

            
        </nav>
    </div>

    <div class="footer-status">
        <span id="status-text">● Status: Standby</span>
        <span>UTF-8</span>
    </div>
</div>

<script>
const FILE_URL = 'https://lbs.su/mods.zip';
const DURATION = 3500; // Немного ускорил для удобства
const BAR_SIZE = 18;

function startDownload() {
    const modal = document.getElementById('gen-modal');
    const bar = document.getElementById('gen-bar');
    const title = document.getElementById('gen-title');
    const statusText = document.getElementById('status-text');

    title.innerText = "Подготовка mods.zip...";
    modal.style.display = 'flex';
    bar.innerText = "[------------------]";
    bar.style.color = "var(--yellow)";
    statusText.innerText = '● Status: Extracting data...';
    statusText.style.color = 'var(--yellow)';

    let elapsed = 0;
    const interval = setInterval(() => {
        elapsed += 250;
        const progress = Math.floor((elapsed / DURATION) * BAR_SIZE);
        bar.innerText = `[${'/'.repeat(progress)}${'-'.repeat(BAR_SIZE - progress)}]`;

        if (elapsed >= DURATION) {
            clearInterval(interval);
            title.innerText = "✅ Архив готов!";
            bar.style.color = "var(--green)";
            
            triggerDownload(FILE_URL, 'mods.zip');

            setTimeout(() => {
                modal.style.display = 'none';
                statusText.innerText = '● Status: Finished';
                statusText.style.color = 'var(--green)';
                setTimeout(() => {
                    statusText.innerText = '● Status: Standby';
                    statusText.style.color = '#8b949e';
                }, 3000);
            }, 1000);
        }
    }, 250);
}

function triggerDownload(url, name) {
    const a = document.createElement('a');
    a.href = url;
    a.download = name;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
}
</script>

</body>
</html>
