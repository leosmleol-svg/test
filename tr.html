<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MD Редактор — LBS.SU</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root[data-theme="dark"] { --bg: #0a0a0a; --card: #141414; --acc: #00ff88; --txt: #eee; --brd: #222; --item: #1c1c1c; --muted: #777; --btn-hover: #1f1f1f; }
        :root[data-theme="light"] { --bg: #f8f9fa; --card: #fff; --acc: #007bff; --txt: #222; --brd: #eaeaea; --item: #f1f3f5; --muted: #999; --btn-hover: #e9ecef; }
        
        body { background: var(--bg); color: var(--txt); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 0; padding: 15px; display: flex; justify-content: center; min-height: 100vh; box-sizing: border-box; }
        
        .container { width: 100%; max-width: 1000px; display: flex; flex-direction: column; gap: 15px; }
        .card { background: var(--card); border: 1px solid var(--brd); padding: 25px; border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        
        .header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        h2 { margin: 0; font-size: 1.4rem; font-weight: 800; letter-spacing: -0.5px; }

        .editor-grid { display: grid; grid-template-columns: 1fr; gap: 20px; }
        @media (min-width: 768px) { .editor-grid { grid-template-columns: 1fr 1fr; } }

        .label { font-size: 11px; font-weight: 800; color: var(--acc); text-transform: uppercase; margin-bottom: 10px; display: block; opacity: 0.8; }

        textarea { 
            width: 100%; height: 450px; background: var(--item); border: 1px solid var(--brd); 
            border-radius: 18px; padding: 15px; color: var(--txt); font-family: 'Consolas', monospace; 
            font-size: 14px; resize: none; outline: none; box-sizing: border-box;
        }
        textarea:focus { border-color: var(--acc); }

        #preview { 
            width: 100%; height: 450px; background: var(--card); border: 1px solid var(--brd); 
            border-radius: 18px; padding: 15px; overflow-y: auto; box-sizing: border-box; font-size: 15px; line-height: 1.6;
        }

        /* Стили внутри превью */
        #preview h1, #preview h2 { color: var(--acc); border-bottom: 1px solid var(--brd); padding-bottom: 5px; }
        #preview code { background: var(--item); padding: 2px 5px; border-radius: 5px; color: var(--acc); }
        #preview pre { background: var(--item); padding: 15px; border-radius: 12px; overflow-x: auto; }

        .footer-link { margin-top: 20px; display: block; text-align: center; color: var(--muted); text-decoration: none; font-size: 13px; }
        .footer-link:hover { color: var(--acc); }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <div class="header-top">
            <h2>LBS Markdown</h2>
            <button onclick="toggleTheme()" style="background:none; border:none; cursor:pointer; font-size:1.2rem;">🌓</button>
        </div>

        <div class="editor-grid">
            <div class="column">
                <span class="label">Редактор</span>
                <textarea id="markdown-input" placeholder="Пиши здесь..." oninput="updatePreview()"># Заголовок
Это **Markdown** редактор для проекта `lbs.su`.

* Список дел
* Еще один пункт

[Ссылка на главную](https://lbs.su)</textarea>
            </div>
            <div class="column">
                <span class="label">Предпросмотр</span>
                <div id="preview"></div>
            </div>
        </div>

        <a href="https://lbs.su" class="footer-link">Вернуться на lbs.su</a>
    </div>
</div>

<script>
    const input = document.getElementById('markdown-input');
    const preview = document.getElementById('preview');

    function updatePreview() {
        // Используем библиотеку marked для рендеринга
        preview.innerHTML = marked.parse(input.value);
    }

    // Тема (localStorage)
    if(localStorage.getItem('theme') === 'light') document.documentElement.setAttribute('data-theme', 'light');
    
    function toggleTheme() {
        const d = document.documentElement;
        const t = d.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
        d.setAttribute('data-theme', t);
        localStorage.setItem('theme', t);
    }

    // Первичный рендер
    updatePreview();
</script>

</body>
</html>
